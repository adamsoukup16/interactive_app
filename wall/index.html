<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Wall - Živé vysílání 16:9</title>
    <link rel="stylesheet" href="wall.css">
</head>
<body>

    <div id="wallHeader" class="wall-header">
        <span id="wallBrandName" class="logo">📸 LIVE FOTOSTĚNA</span>
        <div class="instructions">Naskenujte QR kód a pošlete fotku na plátno!</div>
    </div>

    <main id="wallGrid" class="wall-grid layout-symmetrical-8">
        
        <div id="wallCenterZone" class="wall-center-branding-zone">
            <div id="wallLiveQr" class="brand-component-box"></div>
            <div id="wallLiveLogoContainer" class="brand-component-box">
                <img id="clientLogo" src="" alt="Client Logo" style="display: none;">
            </div>
        </div>
        
    </main>


    <div id="pexesoWallZone" style="display: none; width: 100%; height: 100%; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; font-family: sans-serif;">
    
    <div id="pexesoWallHeader" style="text-align: center; margin-bottom: 20px;">
        <h1 id="pexesoWallTitle" style="color: #fff; font-size: 3.5rem; margin: 0 0 10px 0; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; text-shadow: 0 4px 20px rgba(0,0,0,0.6);">🏆 TURNAJ V PEXESU</h1>
        <p id="pexesoWallSubtitle" style="color: #a78bfa; font-size: 1.5rem; margin: 0; font-weight: 600; letter-spacing: 0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">Naskenujte QR kód a překonejte nejlepší čas!</p>
    </div>

    <div class="leaderboard-board" style="flex-grow: 1; background: rgba(11, 15, 26, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); overflow: hidden; width: 100%; max-width: 1200px; margin: 0 auto; box-sizing: border-box;">
        <div style="display: grid; grid-template-columns: 0.8fr 2.5fr 1.2fr 1.2fr; padding-bottom: 15px; border-bottom: 3px solid #1e293b; color: #94a3b8; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding-left: 20px;">
            <div>Pozice</div>
            <div>Soutěžící</div>
            <div style="text-align: right;">Rychlost</div>
            <div style="text-align: right;">Otočení</div>
        </div>
        
        <div id="pexesoWallRows" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px; overflow: hidden; height: calc(100% - 50px);">
            <div style="color: #64748b; font-style: italic; text-align: center; padding: 100px; font-size: 1.5rem;">Čekám na první herní výsledky...</div>
        </div>
    </div>

    <div id="pexesoWallFooter" style="height: 120px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
        </div>
</div>

    <script type="module" src="wall.js"></script>
</body>
</html>
