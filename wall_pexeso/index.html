<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pexeso Leaderboard - Živé vysílání 16:9</title>
    <link rel="stylesheet" href="../wall/wall.css"> 
</head>
<body style="margin: 0; padding: 0; box-sizing: border-box; background: #05070f; overflow: hidden; height: 100vh; font-family: sans-serif;">

    <div id="pexesoWallZone" style="width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box;">
        
        <div id="pexesoWallHeader" style="text-align: center; margin-bottom: 20px; margin-top: 20px;">
            <h1 id="pexesoWallTitle" style="color: #fff; font-size: 4.2rem; margin: 0; text-transform: uppercase; font-weight: 900; letter-spacing: 3px; text-shadow: 0 4px 20px rgba(0,0,0,0.6);">LEADERBOARD</h1>
        </div>

        <div class="leaderboard-board" style="flex-grow: 1; background: rgba(11, 15, 26, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); overflow: hidden; width: 100%; max-width: 1600px; margin: 0 auto; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
            
            <div style="display: flex; flex-direction: column; height: 100%;">
                <div style="display: grid; grid-template-columns: 0.8fr 2.5fr 1.2fr 1.2fr; padding-bottom: 15px; border-bottom: 3px solid #1e293b; color: #94a3b8; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding-left: 20px;">
                    <div>Pozice</div>
                    <div>Soutěžící</div>
                    <div style="text-align: right;">Rychlost</div>
                    <div style="text-align: right;">Otočení</div>
                </div>
                <div id="pexesoWallRowsLeft" style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px; overflow: hidden; flex-grow: 1;"></div>
            </div>

            <div style="display: flex; flex-direction: column; height: 100%;">
                <div style="display: grid; grid-template-columns: 0.8fr 2.5fr 1.2fr 1.2fr; padding-bottom: 15px; border-bottom: 3px solid #1e293b; color: #94a3b8; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding-left: 20px;">
                    <div>Pozice</div>
                    <div>Soutěžící</div>
                    <div style="text-align: right;">Rychlost</div>
                    <div style="text-align: right;">Otočení</div>
                </div>
                <div id="pexesoWallRowsRight" style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px; overflow: hidden; flex-grow: 1;"></div>
            </div>

        </div>

        <div id="pexesoWallFooter" style="height: 110px; display: flex; justify-content: center; align-items: center; margin-top: 25px; width: 100%;">
            <div id="wallCenterZone" style="display: flex; align-items: center; justify-content: center; box-sizing: border-box; width: 100%; max-width: 1600px; height: 100%;">
                <div id="wallLiveLogoContainer" style="display: flex; align-items: center; justify-content: center;">
                    <img id="clientLogo" src="" alt="Partner Logo" style="display: none; max-height: 80px; object-fit: contain;">
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="wall_pexeso.js"></script>
</body>
</html>
